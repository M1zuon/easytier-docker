name: EasyTier Pre-release Docker Image
#  `DOCKERHUB_USERNAME`: DockerHub 用户名
#  `DOCKERHUB_TOKEN`: DockerHub Access Token

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest release version
        id: get_version
        run: |
          LATEST_TAG=$(curl -s https://api.github.com/repos/EasyTier/EasyTier/releases | jq -r '.[] | select(.prerelease==true) | .tag_name' | head -n 1)
          echo "Latest tag: $LATEST_TAG"
          echo "version_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "version_number=${LATEST_TAG#v}" >> $GITHUB_OUTPUT

      - name: Check if version changed
        id: check_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "Manual trigger detected. Forcing build."
            echo "build=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ -f .github/state/LAST_PRE_VERSION ]; then
            CURRENT_VERSION=$(cat .github/state/LAST_PRE_VERSION)
          else
            CURRENT_VERSION=""
          fi
          
          LATEST_VERSION="${{ steps.get_version.outputs.version_tag }}"
          
          if [ "$LATEST_VERSION" != "$CURRENT_VERSION" ]; then
            echo "New version detected: $LATEST_VERSION"
            echo "build=true" >> $GITHUB_OUTPUT
          else
            echo "Version $LATEST_VERSION is already built."
            echo "build=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU
        if: steps.check_version.outputs.build == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.check_version.outputs.build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.check_version.outputs.build == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        if: steps.check_version.outputs.build == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          build-args: |
            VERSION=${{ steps.get_version.outputs.version_tag }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/easytier:pre
            ${{ secrets.DOCKERHUB_USERNAME }}/easytier:${{ steps.get_version.outputs.version_number }}

      - name: Build and push web
        if: steps.check_version.outputs.build == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.web
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          build-args: |
            VERSION=${{ steps.get_version.outputs.version_tag }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/easytier-web:pre
            ${{ secrets.DOCKERHUB_USERNAME }}/easytier-web:${{ steps.get_version.outputs.version_number }}

      - name: Update Docker Hub Description
        if: steps.check_version.outputs.build == 'true'
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/easytier
          readme-filepath: ./README.md

      - name: Update Docker Hub Description (Web)
        if: steps.check_version.outputs.build == 'true'
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/easytier-web
          readme-filepath: ./README.md

      - name: Update LAST_PRE_VERSION file
        if: steps.check_version.outputs.build == 'true'
        run: |
          mkdir -p .github/state
          echo "${{ steps.get_version.outputs.version_tag }}" > .github/state/LAST_PRE_VERSION
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add .github/state/LAST_PRE_VERSION
          git diff --staged --quiet || (git commit -m "Update LAST_PRE_VERSION to ${{ steps.get_version.outputs.version_tag }}" && git pull --rebase && git push)
